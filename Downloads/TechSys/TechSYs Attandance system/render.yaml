services:
  - type: web
    name: techsys-attendance-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server/server.js
    healthCheckPath: /api
    envVars:
      - key: PORT
        value: 3001
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
